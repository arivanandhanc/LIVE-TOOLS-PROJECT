name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend (lint, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://tools.arivanandhan.in
          NEXT_PUBLIC_API_URL: https://api.arivanandhan.in

  server:
    name: Server (typecheck, test, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [frontend, server]
    steps:
      - uses: actions/checkout@v4
      - name: Build server image
        run: docker build -t convertflow-server ./server
      - name: Build web image
        run: docker build -t convertflow-web ./frontend
