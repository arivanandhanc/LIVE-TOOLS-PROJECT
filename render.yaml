# Render blueprint — deploys the ConvertFlow API (+ optional managed Postgres).
# Frontend is deployed separately on Vercel.
services:
  - type: web
    name: convertflow-api
    runtime: node
    region: singapore
    plan: free
    rootDir: server
    buildCommand: npm install && npm run build && npx prisma generate
    startCommand: npx prisma migrate deploy && npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_BASE_URL
        value: https://api.arivanandhan.in
      - key: CORS_ORIGINS
        value: https://tools.arivanandhan.in
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: convertflow-db
          property: connectionString
      - key: RECAPTCHA_SECRET_KEY
        sync: false
      - key: RECAPTCHA_ENABLED
        value: "true"
      - key: STORAGE_DRIVER
        value: local

databases:
  - name: convertflow-db
    plan: free
    databaseName: convertflow
    user: convertflow
