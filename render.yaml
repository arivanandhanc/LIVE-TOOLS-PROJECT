# Render blueprint — deploys the ConvertFlow API (+ optional managed Postgres).
# Frontend is deployed separately on Vercel.
services:
  - type: web
    name: convertflow-api
    runtime: node
    region: singapore
    plan: free
    rootDir: server
    buildCommand: npm install && npx prisma generate && npm run build
    # `db push` creates/syncs tables directly from schema.prisma (no migration
    # files needed). Safe & idempotent for first deploy. It no-ops if DATABASE_URL
    # is unset (guest mode).
    startCommand: npm run db:push:safe && npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      # API_BASE_URL is auto-derived from RENDER_EXTERNAL_URL; override only if
      # you put the API behind the api.arivanandhan.in custom domain.
      # Set CORS_ORIGINS to your deployed frontend origin after Vercel is live.
      - key: CORS_ORIGINS
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: convertflow-db
          property: connectionString
      - key: RECAPTCHA_SECRET_KEY
        sync: false
      - key: RECAPTCHA_ENABLED
        value: "true"
      - key: STORAGE_DRIVER
        value: local

databases:
  - name: convertflow-db
    plan: free
    databaseName: convertflow
    user: convertflow
